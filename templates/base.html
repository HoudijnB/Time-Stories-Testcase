<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %} titel van de pagina gaat hier {% endblock %}</title>

  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

  <style>
        #popup-success {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1ce23d;
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 9999;
      animation: fadeOut 3s ease-in-out forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }
  </style>
</head>
<body>
<div class="container">
      <!-- Navigation -->
  <nav class="w3-container">
    <div class="w3-bar w3-black">

        <a href="/overzicht" class="w3-bar-item w3-button">Overzicht</a>
        <a href="/karakters" class="w3-bar-item w3-button w3-hover-none w3-text-grey w3-hover-text-white">Karakters</a>
        <a href="/oplossing" class="w3-bar-item w3-button w3-hover-none w3-text-grey w3-hover-text-white">Oplossing</a>
      
    </div>
  </nav>

  <!-- Page content -->
  {% block content %} main content van de pagina {% endblock %}

<!-- Footer? -->
</div>
</body>
</html>
